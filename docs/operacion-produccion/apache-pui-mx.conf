# VirtualHost sugerido para Apache 2.4
# Requiere mod_ssl, mod_proxy, mod_proxy_http y mod_headers

<VirtualHost *:443>
    ServerName api.tudominio.mx
    ServerAdmin admin@tudominio.mx

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.tudominio.mx/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.tudominio.mx/privkey.pem

    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / https://127.0.0.1:8443/
    ProxyPassReverse / https://127.0.0.1:8443/

    SSLProxyEngine on
    SSLProxyProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off

    ErrorLog ${APACHE_LOG_DIR}/pui-mx-error.log
    CustomLog ${APACHE_LOG_DIR}/pui-mx-access.log combined
</VirtualHost>
