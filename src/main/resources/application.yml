server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: pui-mx
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

app:
  datasource:
    platform:
      jdbc-url: jdbc:h2:file:./data/platform-db;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
      username: sa
      password:
      driver-class-name: org.h2.Driver
    datos:
      jdbc-url: jdbc:h2:file:./data/datos-db;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
      username: sa
      password:
      driver-class-name: org.h2.Driver

jwt:
  secret: "CambiarEstaClaveSecretaEnProduccion_256bits!!"
  expiration-ms: 3600000

pui:
  usuario: PUI
  clave: "Pui@Institucion2025!"
  api:
    base-url: http://localhost:8080/mock-pui
    institucion-id: RFC_DEMO010101ABC
    clave: CLAVE_PROPORCIONADA_POR_PUI
    connect-timeout-ms: 5000
    read-timeout-ms: 5000
    demo-mode: true
  biometricos:
    clave: "ClaveAES256ProporcionadaPorPUI"
  scheduler:
    cron: "0 */5 * * * *"

logging:
  level:
    mx.gob.institucion: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
